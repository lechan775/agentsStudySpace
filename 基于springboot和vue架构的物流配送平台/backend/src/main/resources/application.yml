server:
  port: 8080

spring:
  application:
    name: logistics-platform
  datasource:
    url: jdbc:mysql://localhost:3306/logistics_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: logistics-platform-secret-key-2026
  expiration: 86400000

logging:
  level:
    com.logistics: debug
