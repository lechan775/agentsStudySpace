server:
  port: 8080

spring:
  application:
    name: fresh-ecommerce

  datasource:
    url: jdbc:mysql://localhost:3306/fresh_ecommerce?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: asdf1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: FreshEcommerceSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.fresh.ecommerce: DEBUG
    org.springframework.security: DEBUG
